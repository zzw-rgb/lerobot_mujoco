dataset:
  repo_id: franka_pnp_language # 数据集仓库 ID
  root: ./demo_data_language # 本地数据集根目录
policy:
  type : smolvla            # 策略类型：smolvla
  chunk_size: 50            # 动作块大小；对齐 SmolVLA 预训练（原 5 太小，用不上预训练动作先验）
  n_action_steps: 50        # 执行时一次推理走几步
  device: cuda              # 训练设备（使用 GPU）

save_checkpoint: true
output_dir: ./ckpt/smolvla_franka # 检查点保存目录
batch_size: 16
job_name : smolvla_franka
resume: false              # 是否从已有检查点续训
seed : 42
num_workers: 8             # 数据加载进程数（遇 pickling 报错可设为 0）
steps: 20_000              # 训练总步数
eval_freq: -1 # 训练过程中不做评估
log_freq: 50               # 每 50 步记录一次日志
save_checkpoint: true
save_freq: 10_000          # 每 10000 步保存一次检查点
use_policy_training_preset: true # 使用策略自带的训练预设（优化器/调度器等）

wandb:
  enable: true             # 是否启用 Weights & Biases 日志
  project: smolvla_franka
  entity: null
  mode: online
  disable_artifact: true
