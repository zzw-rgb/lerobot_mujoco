dataset:
  repo_id: franka_pnp_language # 数据集仓库 ID
  root: ./demo_data_language # 本地数据集根目录
policy:
  type: smolvla
  device: cuda
  use_amp: true              # BF16 混合精度
  chunk_size: 50             # 与 SmolVLA 基座的预训练动作长度保持一致
  n_action_steps: 10         # 每 0.5 秒重规划，降低长时间开环累计误差
  optimizer_lr: 1.0e-4       # SmolVLA action expert 的官方训练预设
  scheduler_warmup_steps: 1_000
  scheduler_decay_steps: 30_000

save_checkpoint: true
output_dir: ./ckpt/smolvla_franka
batch_size: 16             # 每张 GPU 的 batch；3 卡训练时全局 batch=48
job_name: smolvla_franka
resume: false
seed: 42
num_workers: 8             # 遇到 DataLoader/pickling 问题可设为 0
steps: 30_000
eval_freq: -1              # 使用 deploy_vla.py 的固定种子无头评估
log_freq: 50
save_freq: 5_000
use_policy_training_preset: true # 使用策略自带的训练预设（优化器/调度器等）

wandb:
  enable: true             # 是否启用 Weights & Biases 日志
  project: smolvla_franka
  entity: null
  mode: online
  disable_artifact: true
