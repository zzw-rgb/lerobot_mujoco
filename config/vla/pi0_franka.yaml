dataset:
  repo_id: franka_pnp_language # 数据集仓库 ID
  root: ./demo_data_language # 本地数据集根目录
policy:
  type: pi0
  device: cuda
  use_amp: true              # RTX Ada 使用 BF16 混合精度，降低显存并加速训练
  chunk_size: 50             # 预测未来 2.5 秒动作，恢复 π0 预训练时的长动作块
  # 当前锁定的 LeRobot π0 用该值同时构造训练动作序列，必须与 chunk_size 相同。
  n_action_steps: 50
  optimizer_lr: 2.5e-5       # 使用 π0 官方训练预设的保守学习率
  scheduler_warmup_steps: 1_000
  scheduler_decay_steps: 40_000

save_checkpoint: true
output_dir: ./ckpt/pi0_franka_v2
batch_size: 8              # 每张 GPU 的 batch；3 卡训练时全局 batch=24
job_name: pi0_franka_v2
resume: false
seed: 42
num_workers: 8             # 遇到 DataLoader/pickling 问题可设为 0
steps: 40_000
eval_freq: -1              # 使用 deploy_vla.py 的固定种子无头评估
log_freq: 50
save_freq: 5_000
use_policy_training_preset: true # 使用策略自带的训练预设（优化器/调度器等）

wandb:
  enable: true             # 是否启用 Weights & Biases 日志
  project: pi0_franka
  entity: null
  mode: online
  disable_artifact: true
