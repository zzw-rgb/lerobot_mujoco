dataset:
  repo_id: franka_pnp
  root: ./demo_data

policy:
  type: act
  device: cuda
  # 在 20 Hz 数据上预测未来 2.5 秒；每帧重规划并对重叠动作块做时间集成。
  # 这比一次开环执行 10 帧更适合抓取接触阶段，也能抑制关节目标抖动。
  chunk_size: 50
  n_action_steps: 1
  temporal_ensemble_coeff: 0.01

output_dir: ./ckpt/act_franka
job_name: act_franka
resume: false
seed: 42
num_workers: 0
batch_size: 16
steps: 20_000
eval_freq: -1  # 本项目使用 deploy_il.py 在固定随机种子上评估
log_freq: 50
save_checkpoint: true
save_freq: 5_000  # 多保留中间检查点，按真实成功率选模型而不是只看 loss
use_policy_training_preset: true

wandb:
  enable: true
  project: act_franka
  entity: null
  mode: online
  disable_artifact: true
