dataset:
  repo_id: franka_pnp
  root: ./demo_data

policy:
  type: act
  device: cuda
  chunk_size: 10
  n_action_steps: 10
  temporal_ensemble_coeff: null

output_dir: ./ckpt/act_franka
job_name: act_franka
resume: false
seed: 42
num_workers: 0
batch_size: 16
steps: 20_000
eval_freq: -1
log_freq: 50
save_checkpoint: true
save_freq: 10_000
use_policy_training_preset: true

wandb:
  enable: true
  project: act_franka
  entity: null
  mode: online
  disable_artifact: true
